<!DOCTYPE html>
<html lang="vi">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dang nhap Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'admin_panel/css/base.css' %}">
  <style>
    body { background: #f5f7f5; }
    .admin-login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .admin-login-card {
      width: 100%;
      max-width: 440px;
      border: 1px solid #e7eef0;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 76, 92, 0.12);
      overflow: hidden;
    }
    .admin-login-head {
      background: linear-gradient(120deg, #0f4c5c 0%, #1f7a8c 70%, #2563eb 100%);
      color: #fff;
      padding: 1rem 1.1rem;
    }
  </style>
</head>
<body>
  <div class="admin-login-shell">
    <div class="admin-login-card">
      <div class="admin-login-head">
        <h5 class="mb-1"><i class="bi bi-shield-lock me-2"></i>Dang nhap Admin Panel</h5>
        <small>Chi tai khoan role admin moi duoc truy cap</small>
      </div>
      <div class="p-3 p-md-4">
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'admin_login_submit' %}" class="d-grid gap-3">
          {% csrf_token %}
          <input type="hidden" name="next_url" value="{{ next_url|default:'' }}">

          <div>
            <label for="username" class="form-label mb-1">Ten tai khoan admin</label>
            <input id="username" name="username" class="form-control" type="text" required>
          </div>

          <div>
            <label for="password" class="form-label mb-1">Mat khau</label>
            <input id="password" name="password" class="form-control" type="password" required>
          </div>

          <button class="btn btn-primary" type="submit">
            <i class="bi bi-box-arrow-in-right me-1"></i>Dang nhap admin
          </button>
        </form>

        <div class="mt-3 small text-muted">
          Tai khoan nguoi dung thuong vui long dang nhap tai <a href="/dang-nhap/">/dang-nhap/</a>.
        </div>
      </div>
    </div>
  </div>
</body>
</html>
