<!DOCTYPE html>
<html lang="vi">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký — Nội Trợ AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'user/css/auth.css' %}">
</head>
<body class="auth-register-bg">
  <div class="auth-card">
    <div class="auth-head register">
      <h1><i class="bi bi-person-plus me-2"></i>Tạo tài khoản</h1>
      <p>Bắt đầu sử dụng Nội Trợ AI chỉ trong 1 phút</p>
    </div>
    <div class="auth-body">
      <div id="error-box" class="alert alert-danger py-2 px-3 d-none auth-error-box"></div>

      <!-- Google OAuth Button -->
      <div class="oauth-buttons mb-3">
        <a href="/accounts/google/login/" class="btn btn-oauth w-100">
          <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#4285F4" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#FBBC05" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Đăng ký với Google
        </a>
      </div>

      <div class="oauth-divider"><span>hoặc</span></div>

      <!-- Traditional Register Form -->
      <form id="register-form" class="d-grid gap-3">
        {% csrf_token %}
        <div>
          <label class="form-label mb-1" for="username">Tên tài khoản</label>
          <input id="username" class="form-control" type="text" placeholder="Ví dụ: ngocmai" required>
        </div>
        <div>
          <label class="form-label mb-1" for="password">Mật khẩu</label>
          <input id="password" class="form-control" type="password" placeholder="Tối thiểu 8 ký tự" required>
        </div>
        <div>
          <label class="form-label mb-1" for="confirm-password">Nhập lại mật khẩu</label>
          <input id="confirm-password" class="form-control" type="password" placeholder="Nhập lại mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-auth">Đăng ký</button>
      </form>

      <div class="text-center mt-3 auth-footer-text">
        Đã có tài khoản?
        <a href="/dang-nhap/" class="auth-link">Đăng nhập</a>
      </div>
    </div>
  </div>
  <script src="{% static 'user/js/register.js' %}?v=20260510-1"></script>
</body>
</html>
