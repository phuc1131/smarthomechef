<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Noi Tro AI{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --primary: #2e7d32;
      --primary-light: #4caf50;
      --primary-dark: #1b5e20;
      --accent: #ff8f00;
      --bg: #f5f7f5;
    }
    body { background: var(--bg); font-family: 'Segoe UI', sans-serif; }
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--primary-dark);
      position: fixed; top: 0; left: 0; z-index: 100;
      display: flex; flex-direction: column;
    }
    .sidebar-brand {
      padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-brand h5 { color: #fff; margin: 0; font-weight: 700; font-size: 1.1rem; }
    .sidebar-brand small { color: rgba(255,255,255,.6); font-size: .75rem; }
    .sidebar-nav { padding: .75rem 0; flex: 1; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem 1.25rem; color: rgba(255,255,255,.75);
      text-decoration: none; font-size: .9rem; transition: all .2s;
      border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      color: #fff; background: rgba(255,255,255,.08);
      border-left-color: var(--primary-light);
    }
    .sidebar-nav a i { font-size: 1.1rem; width: 20px; }
    .main-content { margin-left: 240px; padding: 1.75rem; min-height: 100vh; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h2 { font-weight: 700; color: #1a1a1a; margin: 0; }
    .page-header p { color: #666; margin: .25rem 0 0; font-size: .9rem; }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 1.25rem;
      border: 1px solid #e8f5e9; box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .stat-card .icon {
      width: 48px; height: 48px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .stat-card .label { font-size: .8rem; color: #888; margin-top: .25rem; }
    .card-custom {
      background: #fff; border-radius: 12px; border: 1px solid #e8f5e9;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .card-custom .card-header {
      background: transparent; border-bottom: 1px solid #f0f4f0;
      padding: 1rem 1.25rem; font-weight: 600; font-size: .95rem;
    }
    .btn-primary-custom {
      background: var(--primary); border: none; color: #fff;
      padding: .5rem 1.25rem; border-radius: 8px; font-size: .9rem;
      transition: all .2s;
    }
    .btn-primary-custom:hover { background: var(--primary-light); color: #fff; }
    .chat-bubble-user {
      background: var(--primary); color: #fff;
      border-radius: 18px 18px 4px 18px; padding: .6rem 1rem;
      max-width: 75%; font-size: .9rem; word-break: break-word;
    }
    .chat-bubble-ai {
      background: #fff; color: #222; border: 1px solid #e0e0e0;
      border-radius: 18px 18px 18px 4px; padding: .6rem 1rem;
      max-width: 80%; font-size: .9rem; word-break: break-word;
    }
    .badge-meal { font-size: .7rem; padding: .2rem .5rem; border-radius: 6px; }
    .food-card {
      border-radius: 10px; border: 1px solid #e8f5e9; background: #fff;
      padding: 1rem; transition: box-shadow .2s;
    }
    .food-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    @media (max-width: 768px) {
      .sidebar { width: 100%; min-height: unset; position: relative; }
      .main-content { margin-left: 0; }
    }
    .progress { height: 8px; border-radius: 10px; }
    .calendar-day {
      min-height: 80px; border: 1px solid #e8f5e9; border-radius: 8px;
      padding: .35rem; font-size: .8rem; background: #fff;
    }
    .calendar-day.today { border-color: var(--primary); background: #f1f8f1; }
    .calendar-day.other-month { background: #f9f9f9; opacity: .5; }
    .calendar-day-num { font-weight: 600; color: #333; font-size: .85rem; }
    .calendar-day.today .calendar-day-num { color: var(--primary); }
    .plan-badge {
      display: block; font-size: .65rem; padding: .1rem .35rem;
      border-radius: 4px; margin-top: .15rem; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    #chat-messages { height: 420px; overflow-y: auto; padding: 1rem; }
    .md-content p { margin-bottom: .4rem; }
    .md-content ul, .md-content ol { padding-left: 1.2rem; margin-bottom: .4rem; }
    .md-content strong { font-weight: 600; }
    .md-content p:last-child { margin-bottom: 0; }
    .chat-typing { display: none; }
    .chat-typing.show { display: flex; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; animation: bounce .8s infinite alternate; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-brand">
      <h5><i class="bi bi-stars me-2"></i>Noi Tro AI</h5>
      <small>Tro ly gia dinh thong minh</small>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">
        <i class="bi bi-house-heart"></i> Tong quan
      </a>
      <a href="/chat/" class="{% if active == 'chat' %}active{% endif %}">
        <i class="bi bi-chat-dots"></i> Tro ly AI
      </a>
      <a href="/thuc-don/" class="{% if active == 'meal_plans' %}active{% endif %}">
        <i class="bi bi-calendar3"></i> Thuc don
      </a>
      <a href="/theo-doi/" class="{% if active == 'nutrition' %}active{% endif %}">
        <i class="bi bi-graph-up-arrow"></i> Theo doi
      </a>
      <a href="/mon-an/" class="{% if active == 'foods' %}active{% endif %}">
        <i class="bi bi-egg-fried"></i> Mon an
      </a>
      <a href="/ho-so/" class="{% if active == 'profile' %}active{% endif %}">
        <i class="bi bi-person-circle"></i> Ho so
      </a>
    </nav>
  </div>

  <div class="main-content">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
